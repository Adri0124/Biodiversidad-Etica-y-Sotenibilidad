<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil de Dansereau - Distribución Vertical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #canvas { 
            height: 550px; 
            background: linear-gradient(to bottom, #f0f9ff, #ffffff);
            position: relative;
            border-bottom: 25px solid #452a26; 
            overflow: hidden;
            border-radius: 1rem 1rem 0 0;
        }

        .guia-estrato {
            position: absolute;
            left: 0; width: 100%;
            border-top: 1px dashed #cbd5e1;
            color: #94a3b8;
            font-size: 11px;
            padding: 4px 0 0 15px;
            z-index: 1;
        }

        /* Cada planta es un contenedor que nace desde el suelo (bottom: 0) */
        .planta-pilar {
            position: absolute;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* El tronco conecta el suelo con la copa */
        .tronco-palo {
            width: 3px;
            background: linear-gradient(to top, #452a26, #8d6e63);
            opacity: 0.6;
        }

        /* La copa se ubica al tope del pilar */
        .copa-estrato {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            line-height: 1;
        }
    </style>
</head>
<body class="bg-slate-50 p-4">

<div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
    <div class="bg-emerald-900 p-6 text-white flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black italic">Simulador Dansereau v2.0</h1>
            <p class="text-emerald-200 text-sm">Distribución por Estratificación Vertical</p>
        </div>
        <div class="flex gap-2">
            <button onclick="cargarBosque()" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-xl text-xs font-bold transition">CARGAR BOSQUE (A)</button>
            <button onclick="cargarCana()" class="bg-orange-600 hover:bg-orange-500 px-4 py-2 rounded-xl text-xs font-bold transition">CARGAR CAÑA (B)</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-0">
        <div class="p-6 bg-slate-50 border-r border-slate-200">
            <h3 class="font-bold text-slate-700 mb-4 text-sm">🌿 INVENTARIO</h3>
            <div id="panel-inputs" class="space-y-3 mb-4 max-h-[350px] overflow-y-auto pr-2"></div>
            <button onclick="dibujar()" class="w-full bg-emerald-800 text-white py-4 rounded-2xl font-black shadow-lg hover:scale-105 transition">GENERAR PERFIL VISUAL</button>
        </div>

        <div class="lg:col-span-3 p-6">
            <div id="canvas">
                <!-- Líneas de Estratificación (Ubicación real en el Eje Y) -->
                <div class="guia-estrato" style="bottom: 90%;">25m - EMERGENTES</div>
                <div class="guia-estrato" style="bottom: 72%;">18m - DOSEL ALTO</div>
                <div class="guia-estrato" style="bottom: 48%;">12m - ESTRATO MEDIO</div>
                <div class="guia-estrato" style="bottom: 28%;">5m - ARBUSTIVO</div>
                <div class="guia-estrato" style="bottom: 8%;">1m - HERBÁCEO</div>
            </div>
            
            <div id="indicadores" class="flex justify-around mt-6 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                <div class="text-center"><p class="text-[10px] font-bold text-slate-400">RIQUEZA (S)</p><p id="res-s" class="text-2xl font-black">0</p></div>
                <div class="text-center"><p class="text-[10px] font-bold text-slate-400">DOMINANCIA (D)</p><p id="res-d" class="text-2xl font-black text-rose-600">0.00</p></div>
                <div class="text-center"><p class="text-[10px] font-bold text-slate-400">EQUIDAD (E)</p><p id="res-e" class="text-2xl font-black text-sky-600">0.00</p></div>
            </div>
        </div>
    </div>
</div>

<script>
const CONFIG_PERFIL = {
    'EME': { b: 90, icon: '🌲', size: 65, tronco: true }, 
    'DOS': { b: 72, icon: '🌳', size: 55, tronco: true }, 
    'MED': { b: 48, icon: '🌴', size: 45, tronco: true }, 
    'ARB': { b: 28, icon: '🌿', size: 35, tronco: false }, 
    'HER': { b: 8, icon: '🌱', size: 25, tronco: false },
    'APO': { b: 60, icon: '🌸', size: 20, tronco: false }
};

function nuevaFila(n='', c='', t='HER') {
    const div = document.createElement('div');
    div.className = "bg-white p-3 rounded-xl border border-slate-200 flex flex-col gap-1";
    div.innerHTML = `
        <input type="text" value="${n}" class="i-nom text-[10px] font-bold outline-none uppercase text-emerald-800" placeholder="Especie">
        <div class="flex gap-2">
            <input type="number" value="${c}" class="i-can w-12 text-xs p-1 border rounded" placeholder="Cant">
            <select class="i-est flex-1 text-[10px] font-bold p-1 border rounded bg-slate-50">
                <option value="EME" ${t==='EME'?'selected':''}>Emergente</option>
                <option value="DOS" ${t==='DOS'?'selected':''}>Dosel</option>
                <option value="MED" ${t==='MED'?'selected':''}>Medio</option>
                <option value="ARB" ${t==='ARB'?'selected':''}>Arbustivo</option>
                <option value="HER" ${t==='HER'?'selected':''}>Herbáceo</option>
            </select>
        </div>`;
    document.getElementById('panel-inputs').prepend(div);
}

function cargarBosque() {
    document.getElementById('panel-inputs').innerHTML = '';
    nuevaFila('Cebil Colorado', 4, 'EME');
    nuevaFila('Tarco', 6, 'DOS');
    nuevaFila('Lanza Blanca', 10, 'MED');
    nuevaFila('Helechos', 15, 'HER');
    dibujar();
}

function cargarCana() {
    document.getElementById('panel-inputs').innerHTML = '';
    nuevaFila('Caña de Azúcar', 120, 'ARB');
    nuevaFila('Gramilla', 40, 'HER');
    dibujar();
}

function dibujar() {
    const canvas = document.getElementById('canvas');
    canvas.querySelectorAll('.planta-pilar').forEach(el => el.remove());

    const inputs = document.querySelectorAll('.i-can');
    const ests = document.querySelectorAll('.i-est');

    let N = 0, especies = [];
    inputs.forEach((c, i) => {
        let nVal = parseInt(c.value) || 0;
        if(nVal > 0) { 
            N += nVal; 
            especies.push({ n: nVal, t: ests[i].value }); 
        }
    });

    // Índices
    document.getElementById('res-s').innerText = especies.length;
    let D = especies.reduce((acc, sp) => acc + Math.pow(sp.n / N, 2), 0);
    document.getElementById('res-d').innerText = D.toFixed(3);
    document.getElementById('res-e').innerText = (especies.length > 1 ? (1/D)/especies.length : 0).toFixed(3);

    // Renderizado Vertical
    especies.forEach(sp => {
        let visualCount = Math.min(sp.n, 30);
        const config = CONFIG_PERFIL[sp.t];

        for(let i=0; i < visualCount; i++) {
            const pilar = document.createElement('div');
            pilar.className = "planta-pilar";
            pilar.style.left = (Math.random() * 90 + 5) + "%";
            
            // La altura del pilar define dónde está la copa
            pilar.style.height = config.b + "%";

            // Copa
            const copa = document.createElement('div');
            copa.className = "copa-estrato";
            copa.style.fontSize = config.size + "px";
            copa.innerHTML = config.icon;

            // Tronco (solo si es árbol alto)
            if(config.tronco) {
                const tronco = document.createElement('div');
                tronco.className = "tronco-palo";
                tronco.style.height = "100%";
                pilar.appendChild(tronco);
            }

            pilar.prepend(copa); // Pone la copa al principio (arriba)
            canvas.appendChild(pilar);
        }
    });
}
nuevaFila();
</script>
</body>
</html>
