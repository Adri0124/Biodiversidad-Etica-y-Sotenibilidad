<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil de Dansereau - TP3 Biodiversidad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Contenedor principal del gráfico */
        #canvas { 
            height: 500px; 
            width: 100%;
            background: linear-gradient(to bottom, #bae6fd, #ffffff);
            position: relative;
            border-bottom: 25px solid #5d4037; /* El suelo */
            overflow: hidden;
            border-radius: 1rem 1rem 0 0;
        }

        /* Líneas de escala que sirven de guía */
        .guia-estrato {
            position: absolute;
            left: 0; width: 100%;
            border-top: 1px dashed #94a3b8;
            color: #64748b;
            font-size: 11px;
            font-weight: bold;
            padding-left: 10px;
            z-index: 1;
            pointer-events: none;
        }

        /* Cada icono individual */
        .dibujo-planta {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            transition: all 0.6s ease-out;
        }

        .tronco-visual {
            width: 3px;
            background-color: rgba(93, 64, 55, 0.5);
            position: absolute;
            bottom: 0;
            z-index: -1;
        }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8">

<div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
    <div class="bg-emerald-900 p-6 text-white flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black">Simulador Estructural de Comunidades</h1>
            <p class="text-emerald-200 text-sm">Cátedra de Ética y Sostenibilidad Ambiental</p>
        </div>
        <div class="flex gap-2">
            <button onclick="cargarBosque()" class="bg-emerald-700 hover:bg-emerald-600 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider transition">Cargar Bosque (A)</button>
            <button onclick="cargarCana()" class="bg-orange-600 hover:bg-orange-500 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider transition">Cargar Caña (B)</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-0">
        <!-- Panel de Datos -->
        <div class="p-6 bg-slate-50 border-r border-slate-200">
            <h3 class="font-bold text-slate-700 mb-4">🌿 Inventario</h3>
            <div id="inputs-container" class="space-y-3 mb-4 max-h-[350px] overflow-y-auto pr-2"></div>
            <button onclick="nuevaEspecie()" class="w-full py-2 mb-4 border-2 border-dashed border-emerald-300 text-emerald-700 rounded-xl text-xs font-bold">+ Especie</button>
            <button onclick="dibujarPerfil()" class="w-full bg-emerald-800 hover:bg-black text-white py-4 rounded-2xl font-black shadow-lg transition">GENERAR PERFIL</button>
        </div>

        <!-- Perfil Visual -->
        <div class="lg:col-span-3 p-6">
            <div id="canvas">
                <!-- Líneas de Estratificación (Bottom es la distancia desde el suelo) -->
                <div class="guia-estrato" style="bottom: 90%;">25m - Emergentes</div>
                <div class="guia-estrato" style="bottom: 75%;">18m - Dosel Alto</div>
                <div class="guia-estrato" style="bottom: 55%;">12m - Estrato Medio</div>
                <div class="guia-estrato" style="bottom: 30%;">5m - Arbustivo / Caña</div>
                <div class="guia-estrato" style="bottom: 10%;">1m - Herbáceo</div>
            </div>

            <div class="grid grid-cols-4 gap-4 mt-6">
                <div class="text-center p-3 bg-white border rounded-2xl shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Riqueza (S)</p>
                    <p id="res-s" class="text-2xl font-black">0</p>
                </div>
                <div class="text-center p-3 bg-white border rounded-2xl shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Total (N)</p>
                    <p id="res-n" class="text-2xl font-black">0</p>
                </div>
                <div class="text-center p-3 bg-rose-50 border-rose-100 border rounded-2xl shadow-sm">
                    <p class="text-[10px] font-bold text-rose-400 uppercase">Dominancia (D)</p>
                    <p id="res-d" class="text-2xl font-black text-rose-600">0.00</p>
                </div>
                <div class="text-center p-3 bg-sky-50 border-sky-100 border rounded-2xl shadow-sm">
                    <p class="text-[10px] font-bold text-sky-400 uppercase">Equidad (E)</p>
                    <p id="res-e" class="text-2xl font-black text-sky-600">0.00</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// CONFIGURACIÓN DE ALTURAS (Porcentaje de bottom desde el suelo)
const DATA_ESTRATOS = {
    'EME': { altura: 90, icon: '🌲', size: 60, tieneTronco: true }, 
    'DOS': { altura: 75, icon: '🌳', size: 50, tieneTronco: true }, 
    'MED': { altura: 55, icon: '🌴', size: 40, tieneTronco: true }, 
    'ARB': { altura: 30, icon: '🌿', size: 30, tieneTronco: false }, 
    'HER': { altura: 10, icon: '🌱', size: 20, tieneTronco: false },
    'APO': { altura: 65, icon: '🌸', size: 20, tieneTronco: false },
    'CON': { altura: 80, icon: '🧶', size: 25, tieneTronco: false }
};

function nuevaEspecie(nom='', cant='', est='HER') {
    const cont = document.getElementById('inputs-container');
    const div = document.createElement('div');
    div.className = "bg-white p-3 rounded-xl border border-slate-200 flex flex-col gap-2 shadow-sm";
    div.innerHTML = `
        <input type="text" value="${nom}" placeholder="Nombre" class="i-nom text-xs font-bold outline-none border-b border-slate-100 focus:border-emerald-500">
        <div class="flex gap-2">
            <input type="number" value="${cant}" placeholder="Cant" class="i-cant w-14 text-xs p-1 border rounded">
            <select class="i-est flex-1 text-[10px] font-bold p-1 border rounded bg-slate-50">
                <option value="EME" ${est==='EME'?'selected':''}>Emergente</option>
                <option value="DOS" ${est==='DOS'?'selected':''}>Dosel Alto</option>
                <option value="MED" ${est==='MED'?'selected':''}>E. Medio</option>
                <option value="ARB" ${est==='ARB'?'selected':''}>Arbustivo</option>
                <option value="HER" ${est==='HER'?'selected':''}>Herbáceo</option>
            </select>
            <button onclick="this.parentElement.parentElement.remove()" class="text-rose-400 hover:text-rose-600 font-bold">✕</button>
        </div>`;
    cont.prepend(div);
}

function cargarBosque() {
    document.getElementById('inputs-container').innerHTML = '';
    nuevaEspecie('Cebil Colorado', 5, 'EME'); 
    nuevaEspecie('Tipa Blanca', 6, 'DOS');
    nuevaEspecie('Lanza Blanca', 10, 'MED'); 
    nuevaEspecie('Helechos', 15, 'HER');
    dibujarPerfil();
}

function cargarCana() {
    document.getElementById('inputs-container').innerHTML = '';
    nuevaEspecie('Caña de Azúcar', 120, 'ARB'); 
    nuevaEspecie('Gramilla', 30, 'HER');
    dibujarPerfil();
}

function dibujarPerfil() {
    const canvas = document.getElementById('canvas');
    // Limpiar solo los dibujos, no las guías
    canvas.querySelectorAll('.dibujo-planta').forEach(el => el.remove());

    const cants = document.querySelectorAll('.i-cant');
    const ests = document.querySelectorAll('.i-est');

    let N = 0; 
    let especies = [];
    cants.forEach((c, i) => {
        let nVal = parseInt(c.value) || 0;
        if(nVal > 0) { 
            N += nVal; 
            especies.push({ n: nVal, e: ests[i].value }); 
        }
    });

    // Cálculos
    let S = especies.length;
    let D = especies.reduce((acc, sp) => acc + Math.pow(sp.n / N, 2), 0);
    let E = S > 1 ? (1/D) / S : 0;

    document.getElementById('res-s').innerText = S;
    document.getElementById('res-n').innerText = N;
    document.getElementById('res-d').innerText = D.toFixed(3);
    document.getElementById('res-e').innerText = E.toFixed(3);

    // DIBUJO REAL
    especies.forEach(sp => {
        let limit = Math.min(sp.n, 35); // Límite para no saturar
        const conf = DATA_ESTRATOS[sp.e];

        for(let i=0; i < limit; i++) {
            const el = document.createElement('div');
            el.className = "dibujo-planta";
            
            // Posición Horizontal Aleatoria
            el.style.left = (Math.random() * 90 + 5) + "%";
            
            // Posición Vertical: La base del icono se ancla al porcentaje de su estrato
            el.style.bottom = conf.altura + "%";

            // Icono
            el.innerHTML = `<span style="font-size: ${conf.size}px; line-height: 1;">${conf.icon}</span>`;

            // Si es árbol, agregamos el tronco que baja hasta el suelo (0%)
            if(conf.tieneTronco) {
                const tronco = document.createElement('div');
                tronco.className = "tronco-visual";
                // La altura del tronco es igual al porcentaje de la altura (conf.altura)
                // Multiplicamos por 5 porque el canvas mide 500px (1% = 5px)
                tronco.style.height = (conf.altura * 5) + "px";
                // Posicionamos el tronco debajo de la copa
                tronco.style.bottom = "-" + (conf.altura * 5) + "px";
                el.appendChild(tronco);
            }
            
            canvas.appendChild(el);
        }
    });
}

// Iniciar con fila vacía
nuevaEspecie();
</script>
</body>
</html>
