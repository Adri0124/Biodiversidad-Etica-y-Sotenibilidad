<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Biodiversidad - Ecología UNJu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perfil-container { height: 450px; border-bottom: 5px solid #3e2723; position: relative; background: linear-gradient(to bottom, #e3f2fd, #ffffff); overflow: hidden; }
        .estrato-line { position: absolute; width: 100%; border-top: 1px dashed #cbd5e0; font-size: 11px; color: #718096; padding-left: 10px; z-index: 0; }
        .planta { position: absolute; bottom: 0; transition: all 0.5s; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .label-planta { font-size: 9px; color: #4a5568; background: rgba(255,255,255,0.7); border-radius: 3px; padding: 1px; }
    </style>
</head>
<body class="bg-slate-100 p-4 font-sans">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-2xl shadow-2xl">
        <header class="flex justify-between items-center border-b pb-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-emerald-800">Taller de Simulación: Estructura de Comunidades</h1>
                <p class="text-sm text-slate-500">Clasificación Estructural de Dansereau & Smith-Smith</p>
            </div>
            <div class="text-right">
                <button onclick="cargarFichaB()" class="bg-amber-500 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-amber-600 shadow-md">Cargar Ficha B (Caña de Azúcar)</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Ingreso de Datos -->
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <h2 class="font-bold mb-4 text-slate-700 border-b">Datos de Campo</h2>
                <div id="inputs" class="max-h-80 overflow-y-auto pr-2">
                    <!-- Filas dinámicas -->
                </div>
                <button onclick="agregarFila()" class="w-full mt-4 bg-slate-200 text-slate-700 py-2 rounded-md hover:bg-slate-300 text-sm">+ Nueva Especie</button>
                <button onclick="procesar()" class="w-full mt-2 bg-emerald-600 text-white py-3 rounded-md font-bold hover:bg-emerald-700 shadow-lg">CALCULAR ESTRATIFICACIÓN</button>
            </div>

            <!-- Visualización Dansereau -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl border shadow-inner p-2">
                    <div class="perfil-container" id="canvas">
                        <div class="estrato-line" style="top: 10%;">25m - Árbol Emergente</div>
                        <div class="estrato-line" style="top: 30%;">15m - Árbol de Dosel</div>
                        <div class="estrato-line" style="top: 50%;">8m - Estrato Medio</div>
                        <div class="estrato-line" style="top: 75%;">3m - Estrato Arbustivo / Caña</div>
                        <div class="estrato-line" style="top: 92%;">0.5m - Herbáceo / Suelo</div>
                    </div>
                </div>

                <!-- Resultados -->
                <div class="grid grid-cols-4 gap-2 mt-4 text-center">
                    <div class="bg-emerald-50 p-2 rounded border border-emerald-100"><small class="text-slate-500 block">Riqueza (S)</small><b id="res-s" class="text-xl">0</b></div>
                    <div class="bg-emerald-50 p-2 rounded border border-emerald-100"><small class="text-slate-500 block">Individuos (N)</small><b id="res-n" class="text-xl">0</b></div>
                    <div class="bg-rose-50 p-2 rounded border border-rose-100"><small class="text-slate-500 block">Dominancia (D)</small><b id="res-d" class="text-xl">0.00</b></div>
                    <div class="bg-blue-50 p-2 rounded border border-blue-100"><small class="text-slate-500 block">Equidad (E)</small><b id="res-e" class="text-xl">0.00</b></div>
                </div>
            </div>
        </div>
    </div>

<script>
const CLASES = {
    'EM': { h: '90%', icon: '🌳', label: 'Emergente' },
    'DO': { h: '70%', icon: '🌳', label: 'Dosel' },
    'EMED': { h: '50%', icon: '🌲', label: 'E. Medio' },
    'ARB': { h: '25%', icon: '🌿', label: 'Arbustivo' },
    'HERB': { h: '8%', icon: '🌱', label: 'Herbáceo' },
    'APOYO': { h: '60%', icon: '🌸', label: 'Apoyo (Orquídea/Epífita)' },
    'CONV': { h: '85%', icon: '🧶', label: 'Conector (Liana)' }
};

function agregarFila(sp='', cant='', tipo='HERB') {
    const div = document.createElement('div');
    div.className = "flex gap-1 mb-2 items-center bg-white p-2 rounded border shadow-sm";
    div.innerHTML = `
        <input type="text" value="${sp}" placeholder="Especie" class="n-sp border-none text-sm w-full focus:ring-0">
        <input type="number" value="${cant}" placeholder="Cant" class="c-sp border-l px-1 text-sm w-16 focus:ring-0">
        <select class="t-sp border-l text-xs bg-transparent focus:ring-0">
            <option value="EM" ${tipo=='EM'?'selected':''}>Emergente</option>
            <option value="DO" ${tipo=='DO'?'selected':''}>Dosel</option>
            <option value="EMED" ${tipo=='EMED'?'selected':''}>E. Medio</option>
            <option value="ARB" ${tipo=='ARB'?'selected':''}>Arbustivo/Caña</option>
            <option value="HERB" ${tipo=='HERB'?'selected':''}>Herbáceo</option>
            <option value="APOYO" ${tipo=='APOYO'?'selected':''}>Org. Apoyo</option>
            <option value="CONV" ${tipo=='CONV'?'selected':''}>Conector Vert.</option>
        </select>
    `;
    document.getElementById('inputs').appendChild(div);
}

function cargarFichaB() {
    document.getElementById('inputs').innerHTML = '';
    agregarFila('Caña de Azúcar', 180, 'ARB');
    agregarFila('Cebollín', 12, 'HERB');
    agregarFila('Gramilla', 8, 'HERB');
    agregarFila('Yuyo Colorado', 2, 'HERB');
    procesar();
}

function procesar() {
    const nombres = document.querySelectorAll('.n-sp');
    const cants = document.querySelectorAll('.c-sp');
    const tipos = document.querySelectorAll('.t-sp');
    const canvas = document.getElementById('canvas');
    canvas.querySelectorAll('.planta').forEach(p => p.remove());

    let N = 0; let especies = [];
    cants.forEach((c, i) => {
        let n = parseInt(c.value) || 0;
        if (n > 0) { N += n; especies.push({ n, t: tipos[i].value, name: nombres[i].value }); }
    });

    let S = especies.length; let D = 0;
    especies.forEach(sp => { D += Math.pow(sp.n / N, 2); });
    let E = S > 0 ? (1/D) / S : 0;

    document.getElementById('res-s').innerText = S;
    document.getElementById('res-n').innerText = N;
    document.getElementById('res-d').innerText = D.toFixed(3);
    document.getElementById('res-e').innerText = E.toFixed(3);

    especies.forEach(sp => {
        let mostrar = Math.min(sp.n, 12);
        for(let j=0; j<mostrar; j++) {
            const p = document.createElement('div');
            p.className = "planta";
            const config = CLASES[sp.t];
            p.style.left = (Math.random() * 90 + 5) + '%';
            p.style.height = config.h;
            p.innerHTML = `<span style="font-size:${sp.t==='EM'?'45px':sp.t==='HERB'?'15px':'30px'}">${config.icon}</span>`;
            canvas.appendChild(p);
        }
    });
}
// Inicializar con una fila vacía
agregarFila();
</script>
</body>
</html>
