<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cátedra de Ética y Sostenibilidad Ambiental - FCA UNJu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Paleta FCA UNJu y Estética Técnica */
        :root {
            --verde-fca: #1b5e20;
            --verde-claro: #4caf50;
            --tierra: #5d4037;
        }

        .perfil-container { 
            height: 550px; 
            border-bottom: 5px solid var(--tierra); 
            border-left: 2px solid #333;
            position: relative; 
            background: #f8fafc; 
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }
        
        .estrato-line { 
            position: absolute; width: 100%; border-top: 1px dashed #cbd5e1; 
            font-size: 11px; color: #64748b; padding-left: 12px; z-index: 1; 
            font-weight: bold;
        }

        .simbolo-dansereau { 
            position: absolute; bottom: 0; display: flex; flex-direction: column; 
            align-items: center; z-index: 2; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tronco-tecnico { width: 2px; background: var(--tierra); opacity: 0.6; position: absolute; bottom: 0; }

        /* Colores Dinámicos por Tipo de Planta */
        .c-EME { fill: #065f46; stroke: #064e3b; } /* Emergente */
        .c-DOS { fill: #059669; stroke: #064e3b; } /* Dosel */
        .c-MED { fill: #10b981; stroke: #065f46; } /* Medio */
        .c-ARB { fill: #b45309; stroke: #78350f; } /* Arbustivo */
        .c-HER { fill: #84cc16; stroke: #3f6212; } /* Herbáceo */
        .c-APO { fill: #d946ef; stroke: #701a75; } /* Epífita */
        .c-CON { fill: #6366f1; stroke: #312e81; } /* Liana */

        .svg-dansereau { stroke-width: 1.5; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1)); }
        
        /* Scrollbar estética para el inventario */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</
