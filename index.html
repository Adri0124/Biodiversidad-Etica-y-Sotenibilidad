<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Biodiversidad - Modelo Dansereau</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perfil-container { 
            height: 500px; 
            border-bottom: 12px solid #3e2723; 
            position: relative; 
            background: linear-gradient(to bottom, #e0f2fe, #ffffff); 
            overflow: hidden; 
        }
        .estrato-line { 
            position: absolute; 
            width: 100%; 
            border-top: 1px dashed #cbd5e1; 
            font-size: 11px; 
            color: #64748b; 
            padding-left: 10px; 
            z-index: 1; 
        }
        /* CORRECCIÓN AQUÍ: Los iconos se alinean al inicio (arriba) de su contenedor de altura */
        .planta { 
            position: absolute; 
            bottom: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            z-index: 2; 
        }
        .planta span { display: block; line-height: 1; }
    </style>
</head>
<body class="bg-slate-50 p-6">

    <div class="max-w-6xl mx-auto bg-white p-8 rounded-3xl shadow-2xl border border-slate-200">
        <header class="flex flex-col md:row justify-between mb-8 gap-4 border-b pb-6">
            <div>
                <h1 class="text-3xl font-black text-emerald-900">TP3: Biodiversidad</h1>
                <p class="text-emerald-700">Simulador Estructural (Modelo Dansereau)</p>
            </div>
            <div class="flex gap-2">
                <button onclick="cargarFichaA()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-emerald-700">FICHA A (BOSQUE)</button>
                <button onclick="cargarFichaB()" class="bg-orange-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-orange-600">FICHA B (CAÑA)</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-4">
                <div id="inputs" class="space-y-2 max-h-[400px] overflow-y-auto pr-2"></div>
                <button onclick="agregarFila()" class="w-full py-2 text-xs font-bold border-2 border-dashed border-emerald-200 text-emerald-600 rounded-lg">+ ESPECIE</button>
                <button onclick="procesar()" class="w-full bg-emerald-900 text-white py-4 rounded-xl font-black shadow-lg">GENERAR PERFIL</button>
            </div>

            <div class="lg:col-span-3">
                <div class="perfil-container rounded-2xl border shadow-inner mb-6" id="canvas">
                    <div class="estrato-line" style="top: 10%;">25m - Emergente</div>
                    <div class="estrato-line" style="top: 25%;">18m - Dosel</div>
                    <div class="estrato-line" style="top: 45%;">10m - Medio</div>
                    <div class="estrato-line" style="top: 70%;">5m - Arbustivo</div>
                    <div class="estrato-line" style="top: 90%;">1m - Suelo</div>
                </div>

                <div class="grid grid-cols-4 gap-4 text-center">
                    <div class="bg-slate-50 p-3 rounded-xl border"><p class="text-xs text-slate-400">RIQUEZA (S)</p><p id="res-s" class="text-2xl font-black">0</p></div>
                    <div class="bg-slate-50 p-3 rounded-xl border"><p class="text-xs text-slate-400">INDIVIDUOS (N)</p><p id="res-n" class="text-2xl font-black">0</p></div>
                    <div class="bg-rose-50 p-3 rounded-xl border"><p class="text-xs text-rose-400">DOMINANCIA (D)</p><p id="res-d" class="text-2xl font-black text-rose-600">0.00</p></div>
                    <div class="bg-sky-50 p-3 rounded-xl border"><p class="text-xs text-sky-400">EQUIDAD (E)</p><p id="res-e" class="text-2xl font-black text-sky-600">0.00</p></div>
                </div>
            </div>
        </div>
    </div>

<script>
const ESTRATOS = {
    'EME': { h: '90%', icon: '🌲', size: '60px' }, 
    'DOS': { h: '75%', icon: '🌳', size: '50px' }, 
    'MED': { h: '55%', icon: '🌴', size: '40px' }, 
    'ARB': { h: '30%', icon: '🌿', size: '30px' }, 
    'HER': { h: '10%', icon: '🌱', size: '18px' },
    'APO': { h: '60%', icon: '🌸', size: '20px' },
    'CON': { h: '85%', icon: '🧶', size: '25px' }
};

function agregarFila(n='', c='', t='HER') {
    const div = document.createElement('div');
    div.className = "bg-slate-50 p-2 rounded border text-xs flex flex-col gap-1";
    div.innerHTML = `
        <input type="text" value="${n}" placeholder="Especie" class="n-sp font-bold bg-transparent outline-none border-b border-slate-200">
        <div class="flex gap-1">
            <input type="number" value="${c}" placeholder="Cant" class="c-sp w-12 p-1 border rounded">
            <select class="t-sp flex-1 p-1 border rounded">
                <option value="EME" ${t==='EME'?'selected':''}>Emergente</option>
                <option value="DOS" ${t==='DOS'?'selected':''}>Dosel</option>
                <option value="MED" ${t==='MED'?'selected':''}>Medio</option>
                <option value="ARB" ${t==='ARB'?'selected':''}>Arbustivo</option>
                <option value="HER" ${t==='HER'?'selected':''}>Herbáceo</option>
                <option value="APO" ${t==='APO'?'selected':''}>Apoyo</option>
                <option value="CON" ${t==='CON'?'selected':''}>Conector</option>
            </select>
            <button onclick="this.parentElement.parentElement.remove()" class="text-rose-500 font-bold px-1">✕</button>
        </div>`;
    document.getElementById('inputs').prepend(div);
}

function cargarFichaA() {
    document.getElementById('inputs').innerHTML = '';
    agregarFila('Cebil Colorado', 5, 'EME'); agregarFila('Tipa Blanca', 4, 'DOS');
    agregarFila('Lanza Blanca', 8, 'MED'); agregarFila('Helechos', 15, 'HER');
    agregarFila('Orquídeas', 6, 'APO'); agregarFila('Lianas', 4, 'CON');
    procesar();
}

function cargarFichaB() {
    document.getElementById('inputs').innerHTML = '';
    agregarFila('Caña de Azúcar', 120, 'ARB'); agregarFila('Gramilla', 15, 'HER');
    procesar();
}

function procesar() {
    const canvas = document.getElementById('canvas');
    canvas.querySelectorAll('.planta').forEach(el => el.remove());

    const cants = document.querySelectorAll('.c-sp');
    const tipos = document.querySelectorAll('.t-sp');

    let N = 0; 
    let lista = [];
    cants.forEach((c, i) => {
        let cant = parseInt(c.value) || 0;
        if(cant > 0) { N += cant; lista.push({ n: cant, t: tipos[i].value }); }
    });

    let S = lista.length;
    let D = 0;
    lista.forEach(sp => { D += Math.pow(sp.n / N, 2); });
    let E = S > 1 ? (1/D) / S : 0;

    document.getElementById('res-s').innerText = S;
    document.getElementById('res-n').innerText = N;
    document.getElementById('res-d').innerText = D.toFixed(3);
    document.getElementById('res-e').innerText = E.toFixed(3);

    lista.forEach(sp => {
        let visuales = Math.min(sp.n, 35); 
        const config = ESTRATOS[sp.t];
        for(let i=0; i<visuales; i++) {
            const el = document.createElement('div');
            el.className = "planta";
            el.style.left = (Math.random() * 92 + 4) + '%';
            el.style.height = config.h; // El contenedor llega hasta la línea del estrato
            
            // Si es un árbol, dibujamos un tronco visual para que se vea que sube desde el suelo
            if(['EME', 'DOS', 'MED'].includes(sp.t)) {
                el.innerHTML = `
                    <span style="font-size:${config.size}; z-index:2">${config.icon}</span>
                    <div style="width:4px; height:100%; background:#795548; position:absolute; bottom:0; z-index:1; opacity:0.6"></div>
                `;
            } else if(sp.t === 'CON') { // Lianas
                el.innerHTML = `<div style="height:100%; border-left: 2px dashed #78350f; opacity:0.5"></div><span style="font-size:20px; position:absolute; top:20%">${config.icon}</span>`;
            } else {
                el.innerHTML = `<span style="font-size:${config.size}">${config.icon}</span>`;
            }
            canvas.appendChild(el);
        }
    });
}
agregarFila();
</script>
</body>
</html>
