<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil Estructural de Dansereau</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --linea: #1a1a1a; }
        .canvas-perfil { 
            height: 500px; background: white; position: relative;
            border-bottom: 2px solid var(--linea); border-left: 2px solid var(--linea);
            overflow: hidden;
        }
        .guia-h {
            position: absolute; left: 0; width: 100%; border-top: 1px dashed #ddd;
            font-size: 10px; color: #999; padding: 2px 0 0 5px; z-index: 1;
        }
        .simbolo-dansereau {
            position: absolute; display: flex; flex-direction: column;
            align-items: center; z-index: 2; transition: all 0.4s;
        }
        .tronco-fino { width: 1px; background: var(--linea); position: absolute; bottom: 0; }
        
        /* Estilos para los rellenos SVG */
        .svg-shape { stroke: var(--linea); stroke-width: 1.5; }
        .fill-grid { fill: url(#grid); }
        .fill-lines { fill: url(#lines); }
        .fill-dots { fill: url(#dots); }
    </style>
</head>
<body class="bg-gray-100 p-8">

    <!-- Definición de Patrones de Relleno -->
    <svg width="0" height="0">
        <defs>
            <pattern id="grid" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
                <path d="M 6 0 L 0 0 0 6" fill="none" stroke="black" stroke-width="0.5"/>
            </pattern>
            <pattern id="lines" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                <line x1="0" y1="0" x2="0" y2="5" stroke="black" stroke-width="1" />
            </pattern>
            <pattern id="dots" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
                <circle cx="2" cy="2" r="1" fill="black"/>
            </pattern>
        </defs>
    </svg>

    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden">
        <div class="bg-slate-900 p-5 text-white flex justify-between items-center">
            <h2 class="font-bold text-lg tracking-tight uppercase">Simulador: Perfil de Dansereau (Simbología)</h2>
            <button onclick="dibujar()" class="bg-emerald-600 px-8 py-2 rounded-lg font-bold hover:bg-emerald-500 transition">GENERAR GRÁFICO</button>
        </div>

        <div class="grid grid-cols-12">
            <!-- PANEL DE ENTRADA -->
            <div class="col-span-4 p-5 bg-slate-50 border-r border-slate-200" id="panel-especies">
                <h3 class="text-xs font-bold text-slate-500 mb-4 uppercase">Datos de Campo</h3>
                <div id="inputs" class="space-y-3 mb-4"></div>
                <button onclick="addEspecie()" class="w-full py-2 border-2 border-dashed border-slate-300 text-slate-500 rounded-lg text-xs font-bold hover:bg-white">+ AÑADIR ESPECIE</button>
            </div>

            <!-- ÁREA DEL PERFIL -->
            <div class="col-span-8 p-8 bg-white">
                <div class="canvas-perfil" id="canvas">
                    <div class="guia-h" style="bottom: 90%">25m - EMERGENTE</div>
                    <div class="guia-h" style="bottom: 72%">18m - DOSEL ALTO</div>
                    <div class="guia-h" style="bottom: 48%">12m - E. MEDIO</div>
                    <div class="guia-h" style="bottom: 28%">5m - ARBUSTIVO</div>
                    <div class="guia-h" style="bottom: 8%">1m - HERBÁCEO</div>
                </div>
                
                <div class="flex justify-between mt-6 text-center">
                    <div class="flex-1 border-r"><p class="text-[10px] font-bold text-slate-400 uppercase">Riqueza (S)</p><p id="s-val" class="text-2xl font-black">0</p></div>
                    <div class="flex-1 border-r"><p class="text-[10px] font-bold text-slate-400 uppercase">Dominancia (D)</p><p id="d-val" class="text-2xl font-black text-rose-600">0.00</p></div>
                    <div class="flex-1"><p class="text-[10px] font-bold text-slate-400 uppercase">Equidad (E)</p><p id="e-val" class="text-2xl font-black text-sky-600">0.00</p></div>
                </div>
            </div>
        </div>
    </div>

<script>
// Lógica de Simbología Abstracta
const ESTRATOS = {
    'EME': { h: 90, s: 50, shape: 'circle', fill: 'fill-grid', tronco: true },
    'DOS': { h: 72, s: 45, shape: 'circle', fill: 'fill-grid', tronco: true },
    'MED': { h: 48, s: 40, shape: 'circle', fill: 'fill-lines', tronco: true },
    'ARB': { h: 28, s: 30, shape: 'triangle', fill: 'fill-dots', tronco: false },
    'HER': { h: 8, s: 20, shape: 'semicircle', fill: 'fill-lines', tronco: false }
};

function addEspecie(n='', c='', e='HER') {
    const div = document.createElement('div');
    div.className = "bg-white p-3 rounded-lg border shadow-sm flex flex-col gap-2";
    div.innerHTML = `
        <input type="text" value="${n}" placeholder="Especie" class="i-nom font-bold text-xs outline-none uppercase border-b border-slate-100">
        <div class="flex gap-2 items-center">
            <input type="number" value="${c}" placeholder="N" class="i-can w-14 text-xs border rounded p-1">
            <select class="i-est flex-1 text-[10px] font-bold border rounded p-1 bg-slate-5
