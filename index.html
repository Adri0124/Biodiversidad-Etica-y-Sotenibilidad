<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil Dansereau: Simbología Estructural Abstracta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --suelo: #424242; --cielo: #f8fafc; }
        
        .dansereau-canvas { 
            height: 520px; 
            background: linear-gradient(to bottom, var(--cielo), #ffffff);
            position: relative;
            border-bottom: 25px solid var(--suelo);
            overflow: hidden;
            border-radius: 20px 20px 0 0;
            border: 2px solid #e2e8f0;
        }

        /* Guías de Escala */
        .escala-v {
            position: absolute;
            left: 0; width: 100%;
            border-top: 1px dashed #cbd5e1;
            z-index: 1;
            pointer-events: none;
            display: flex; align-items: center;
            padding-left: 10px; color: #94a3b8;
            font-size: 10px; font-weight: bold;
        }

        /* Elemento base para el símbolo */
        .simbolo-dansereau {
            position: absolute;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            transition: all 0.5s ease;
        }

        /* Estilos de los Símbolos Vectoriales (SVG) */
        .dansereau-svg {
            position: absolute;
            bottom: 0;
            fill: none;
            stroke: #1a1a1a;
            stroke-width: 1.5;
        }

        .patron-cuadricula { fill: url(#cuadricula); }
        .patron-rayas { fill: url(#rayas); }
        .patron-puntos { fill: url(#puntos); }

    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8">

    <svg width="0" height="0">
        <defs>
            <pattern id="cuadricula" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
                <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
            </pattern>
            <pattern id="rayas" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                <rect width="8" height="8" fill="none"/>
                <path d="M 0 4 H 8" stroke="#1a1a1a" stroke-width="1.5"/>
            </pattern>
            <pattern id="puntos" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
                <circle cx="4" cy="4" r="1.5" fill="#1a1a1a"/>
            </pattern>
        </defs>
    </svg>

    <div class="max-w-7xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        
<div class="bg-emerald-950 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tight">Simulador Estructural: Perfil de Dansereau</h1>
                <p class="text-emerald-300 text-sm opacity-80">Simbología Abstracta - Modelo UNJu v3.1</p>
            </div>
            <button onclick="dibujarPerfil()" class="bg-emerald-600 hover:bg-black text-white px-6 py-3 rounded-2xl font-black shadow-lg transition">ACTUALIZAR PERFIL VISUAL</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-0">
            
<div class="p-6 border-r border-slate-100 bg-slate-50">
                <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2">📊 Inventario (Abstracto)</h3>
                <div id="lista-inventario" class="space-y-3 mb-6 max-h-[420px] overflow-y-auto pr-2"></div>
                <button onclick="agregarNuevaEspecie()" class="w-full py-2 mb-4 border-2 border-dashed border-emerald-300 text-emerald-700 rounded-xl text-xs font-bold hover:bg-emerald-50 transition">+ NUEVA ESPECIE</button>
            </div>

            
<div class="lg:col-span-3 p-6">
                <div class="dansereau-canvas mb-6" id="simulador">
                    <div class="escala-v" style="bottom: 90%;">25m - EMERGENTES</div>
                    <div class="escala-v" style="bottom: 72%;">18m - DOSEL ALTO</div>
                    <div class="escala-v" style="bottom: 48%;">12m - MEDIO</div>
                    <div class="escala-v" style="bottom: 28%;">5m - ARBUSTIVO / CAÑA</div>
                    <div class="escala-v" style="bottom: 8%;">1m - HERBÁCEO</div>
                </div>

                
<div class="grid grid-cols-4 gap-4 text-center">

                    <div class="bg-white p-3 rounded-2xl border"><p class="text-[10px] text-slate-400 font-bold uppercase">Total (N)</p><p id="v-n" class="text-3xl font-black">0</p></div>
                    <div class="bg-rose-50 p-3 rounded-2xl border-rose-100"><p class="text-[10px] text-rose-400 font-bold uppercase">Dominancia (D)</p><p id="v-d" class="text-3xl font-black text-rose-700">0.00</p></div>
                    <div class="bg-sky-50 p-3 rounded-2xl border-sky-100"><p class="text-[10px] text-sky-400 font-bold uppercase">Equidad (E)</p><p id="v-e" class="text-3xl font-black text-sky-700">0.00</p></div>
                </div>
            </div>
        </div>
    </div>
