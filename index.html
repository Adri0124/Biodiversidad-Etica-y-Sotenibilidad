<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Biodiversidad - Modelo Dansereau</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perfil-container { 
            height: 500px; 
            border-bottom: 15px solid #3e2723; 
            position: relative; 
            background: linear-gradient(to bottom, #e0f2fe, #ffffff); 
            overflow: hidden; 
        }
        .estrato-line { 
            position: absolute; 
            width: 100%; 
            border-top: 2px dashed #cbd5e1; 
            font-size: 12px; 
            font-weight: bold;
            color: #64748b; 
            padding-left: 10px; 
            z-index: 1; 
            pointer-events: none;
        }
        /* La planta ahora es un punto de origen en el suelo */
        .planta { 
            position: absolute; 
            bottom: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            z-index: 2; 
        }
        /* El icono se posiciona según el valor de 'bottom' que le daremos por JS */
        .icono-visual {
            position: absolute;
            transform: translateY(20%); /* Ajuste fino para que la base del icono toque la línea */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .tronco {
            width: 3px;
            background-color: #5d4037;
            opacity: 0.7;
        }
    </style>
</head>
<body class="bg-slate-100 p-4">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-3xl shadow-2xl">
        <header class="flex justify-between items-center mb-6 border-b pb-4">
            <h1 class="text-2xl font-black text-emerald-900">Perfil de Biodiversidad (Dansereau)</h1>
            <div class="flex gap-2">
                <button onclick="cargarFichaA()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold">FICHA A: BOSQUE</button>
                <button onclick="cargarFichaB()" class="bg-orange-500 text-white px-4 py-2 rounded-lg font-bold">FICHA B: CAÑA</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <div id="inputs" class="space-y-2 max-h-[400px] overflow-y-auto p-2 bg-slate-50 rounded-xl"></div>
                <button onclick="agregarFila()" class="w-full py-2 text-xs font-bold border-2 border-dashed border-emerald-300 text-emerald-600 rounded-lg">+ AGREGAR ESPECIE</button>
                <button onclick="procesar()" class="w-full bg-emerald-900 text-white py-4 rounded-xl font-black shadow-xl hover:bg-black transition">GENERAR PERFIL</button>
            </div>

            <div class="lg:col-span-3">
                <div class="perfil-container rounded-2xl border-2 border-slate-200 shadow-inner mb-6" id="canvas">
                    <!-- Escala Vertical Real -->
                    <div class="estrato-line" style="bottom: 90%;">25m - Emergente</div>
                    <div class="estrato-line" style="bottom: 75%;">18m - Dosel</div>
                    <div class="estrato-line" style="bottom: 55%;">10m - Medio</div>
                    <div class="estrato-line" style="bottom: 30%;">5m - Arbustivo</div>
                    <div class="estrato-line" style="bottom: 10%;">1m - Suelo</div>
                </div>

                <div class="grid grid-cols-4 gap-4 text-center">
                    <div class="bg-white p-2 rounded-lg border">S: <span id="res-s" class="font-bold">0</span></div>
                    <div class="bg-white p-2 rounded-lg border">N: <span id="res-n" class="font-bold">0</span></div>
                    <div class="bg-rose-50 p-2 rounded-lg border">D: <span id="res-d" class="font-bold text-rose-600">0.00</span></div>
                    <div class="bg-sky-50 p-2 rounded-lg border">E: <span id="res-e" class="font-bold text-sky-600">0.00</span></div>
                </div>
            </div>
        </div>
    </div>

<script>
// ALTURAS DEFINIDAS POR PORCENTAJE DESDE EL SUELO (bottom)
const ESTRATOS = {
    'EME': { b: 90, icon: '🌲', size: '60px', tronco: true }, 
    'DOS': { b: 75, icon: '🌳', size: '50px', tronco: true }, 
    'MED': { b: 55, icon: '🌴', size: '40px', tronco: true }, 
    'ARB': { b: 30, icon: '🌿', size: '30px', tronco: false }, 
    'HER': { b: 10, icon: '🌱', size: '20px', tronco: false },
    'APO': { b: 65, icon: '🌸', size: '20px', tronco: false },
    'CON': { b: 80, icon: '🧶', size: '25px', tronco: false }
};

function agregarFila(n='', c='', t='HER') {
    const div = document.createElement('div');
    div.className = "bg-white p-2 rounded border text-xs flex flex-col gap-1 shadow-sm";
    div.innerHTML = `
        <input type="text" value="${n}" placeholder="Especie" class="n-sp font-bold bg-transparent outline-none">
        <div class="flex gap-1">
            <input type="number" value="${c}" placeholder="Cant" class="c-sp w-12 p-1 border rounded">
            <select class="t-sp flex-1 p-1 border rounded bg-white">
                <option value="EME" ${t==='EME'?'selected':''}>Emergente (25m)</option>
                <option value="DOS" ${t==='DOS'?'selected':''}>Dosel (18m)</option>
                <option value="MED" ${t==='MED'?'selected':''}>Medio (10m)</option>
                <option value="ARB" ${t==='ARB'?'selected':''}>Arbustivo (5m)</option>
                <option value="HER" ${t==='HER'?'selected':''}>Herbáceo (1m)</option>
                <option value="APO" ${t==='APO'?'selected':''}>Apoyo</option>
                <option value="CON" ${t==='CON'?'selected':''}>Conector</option>
            </select>
            <button onclick="this.parentElement.parentElement.remove()" class="text-rose-500 font-bold px-1">✕</button>
        </div>`;
    document.getElementById('inputs').prepend(div);
}

function cargarFichaA() {
    document.getElementById('inputs').innerHTML = '';
    agregarFila('Cebil Colorado', 5, 'EME'); 
    agregarFila('Tipa Blanca', 6, 'DOS');
    agregarFila('Lanza Blanca', 10, 'MED'); 
    agregarFila('Helechos', 20, 'HER');
    agregarFila('Orquídeas', 8, 'APO'); 
    agregarFila('Lianas', 5, 'CON');
    procesar();
}

function cargarFichaB() {
    document.getElementById('inputs').innerHTML = '';
    agregarFila('Caña de Azúcar', 120, 'ARB'); 
    agregarFila('Cebollín', 25, 'HER');
    procesar();
}

function procesar() {
    const canvas = document.getElementById('canvas');
    canvas.querySelectorAll('.planta').forEach(el => el.remove());

    const cants = document.querySelectorAll('.c-sp');
    const tipos = document.querySelectorAll('.t-sp');

    let N = 0; 
    let lista = [];
    cants.forEach((c, i) => {
        let cant = parseInt(c.value) || 0;
        if(cant > 0) { N += cant; lista.push({ n: cant, t: tipos[i].value }); }
    });

    document.getElementById('res-s').innerText = lista.length;
    document.getElementById('res-n').innerText = N;

    lista.forEach(sp => {
        let visuales = Math.min(sp.n, 35); 
        const config = ESTRATOS[sp.t];

        for(let i=0; i<visuales; i++) {
            const elPlanta = document.createElement('div');
            elPlanta.className = "planta";
            elPlanta.style.left = (Math.random() * 90 + 5) + '%';
            elPlanta.style.height = "100%"; // El contenedor ocupa todo el alto del canvas

            // El visual se posiciona absolutamente dentro del contenedor usando config.b (bottom)
            const elVisual = document.createElement('div');
            elVisual.className = "icono-visual";
            elVisual.style.bottom = config.b + "%";
            
            let html = `<span style="font-size:${config.size}">${config.icon}</span>`;
            
            // Si el estrato requiere tronco, dibujamos una línea desde la base del icono hasta el suelo (0)
            if(config.tronco) {
                html += `<div class="tronco" style="height: ${config.b * 5}px; margin-top: -5px;"></div>`;
            }
            
            elVisual.innerHTML = html;
            elPlanta.appendChild(elVisual);
            canvas.appendChild(elPlanta);
        }
    });
}
agregarFila();
</script>
</body>
</html>
